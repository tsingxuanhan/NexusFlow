<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铉枢 · A2A 网络拓扑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", monospace;
            background: #0a0c14;
            color: #c0d0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(15, 18, 30, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(74, 122, 204, 0.15);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #7aacff, #a080ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mode-switcher {
            display: flex;
            gap: 4px;
            background: rgba(20, 25, 45, 0.8);
            border-radius: 8px;
            padding: 3px;
        }
        .mode-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: transparent;
            color: rgba(150, 170, 200, 0.6);
        }
        .mode-btn.active {
            background: rgba(74, 122, 204, 0.2);
            color: #7aacff;
            box-shadow: 0 0 12px rgba(74, 122, 204, 0.15);
        }
        .mode-btn:hover:not(.active) {
            color: rgba(180, 200, 230, 0.8);
        }
        .main {
            flex: 1;
            display: flex;
            position: relative;
        }
        .canvas-container {
            flex: 1;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .sidebar {
            width: 280px;
            background: rgba(15, 18, 30, 0.6);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(74, 122, 204, 0.1);
            padding: 16px;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(150, 170, 200, 0.5);
            margin-bottom: 12px;
        }
        .agent-card {
            background: rgba(20, 25, 45, 0.6);
            border: 1px solid rgba(74, 122, 204, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .agent-card:hover {
            border-color: rgba(74, 122, 204, 0.3);
            background: rgba(25, 30, 55, 0.7);
        }
        .agent-card.working {
            border-color: rgba(64, 204, 128, 0.3);
        }
        .agent-card.error {
            border-color: rgba(204, 64, 64, 0.3);
        }
        .agent-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .agent-emoji { font-size: 16px; }
        .agent-name {
            font-size: 12px;
            font-weight: 600;
            color: #7aacff;
        }
        .agent-model {
            margin-left: auto;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(74, 122, 204, 0.15);
            color: rgba(150, 170, 200, 0.7);
        }
        .agent-status {
            font-size: 10px;
            color: rgba(150, 170, 200, 0.5);
        }
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        .status-dot.idle { background: #4a7acc; }
        .status-dot.working { background: #40cc80; animation: pulse 1.5s infinite; }
        .status-dot.error { background: #cc4040; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .legend {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(10, 12, 20, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(74, 122, 204, 0.15);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .legend-item:last-child { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>铉枢 · A2A 网络拓扑</h1>
        <div class="mode-switcher">
            <button class="mode-btn active" data-mode="research" title="Pro模型 + 严格审查 + 全工具">🔬 科研</button>
            <button class="mode-btn" data-mode="engineering" title="Pro规划 + Flash执行 + 代码工具">⚙️ 工程</button>
            <button class="mode-btn" data-mode="casual" title="Flash + 轻量交互">💬 日常</button>
        </div>
    </div>
    <div class="main">
        <div class="canvas-container">
            <canvas id="a2a-canvas"></canvas>
            <div class="legend">
                <div class="legend-item"><span class="status-dot idle"></span> 空闲</div>
                <div class="legend-item"><span class="status-dot working"></span> 工作中</div>
                <div class="legend-item"><span class="status-dot error"></span> 异常</div>
                <div class="legend-item" style="margin-top:6px; color:rgba(150,170,200,0.4)">点击节点查看详情</div>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-title">Agent 列表</div>
            <div id="agent-list"></div>
        </div>
    </div>

    <script src="a2a-network-viz.js"></script>
    <script>
        // 初始化
        const canvas = document.getElementById('a2a-canvas');
        const container = canvas.parentElement;
        
        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (viz) viz.resize();
        });
        
        const viz = new A2ANetworkViz('a2a-canvas');
        
        // 渲染侧边栏Agent列表
        function renderAgentList() {
            const list = document.getElementById('agent-list');
            list.innerHTML = '';
            Object.entries(viz.agents).forEach(([id, agent]) => {
                const state = viz.agentStates[id] || 'idle';
                const card = document.createElement('div');
                card.className = `agent-card ${state}`;
                card.innerHTML = `
                    <div class="agent-card-header">
                        <span class="agent-emoji">${agent.emoji}</span>
                        <span class="agent-name">${agent.label}</span>
                        <span class="agent-model">${agent.model.toUpperCase()}</span>
                    </div>
                    <div class="agent-status">
                        <span class="status-dot ${state}"></span>
                        ${state === 'working' ? '处理中...' : state === 'error' ? '异常' : '空闲'}
                        · ${agent.role}
                    </div>
                `;
                card.addEventListener('click', () => {
                    viz.selectedAgent = id;
                });
                list.appendChild(card);
            });
        }
        renderAgentList();
        
        // 模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const mode = btn.dataset.mode;
                console.log(`切换模式: ${mode}`);
                // TODO: 连接AgentOS API切换模式
            });
        });
        
        // 模拟数据更新（演示用，生产环境连接AgentOS /meta/confidence）
        let simTick = 0;
        setInterval(() => {
            simTick++;
            // 随机切换1-2个Agent状态
            const ids = Object.keys(viz.agentStates);
            const randomId = ids[Math.floor(Math.random() * ids.length)];
            const states = ['idle', 'working', 'idle', 'idle', 'working'];
            viz.agentStates[randomId] = states[Math.floor(Math.random() * states.length)];
            renderAgentList();
        }, 3000);
        
        // 初始：模拟矿工和铸师在工作
        viz.updateAllStates({
            miner: 'working',
            caster: 'working',
            planner: 'idle',
            assayer: 'idle',
            artisan: 'idle',
            executor: 'idle',
            researcher: 'idle',
            reviewer: 'idle',
        });
        renderAgentList();
    </script>
</body>
</html>
