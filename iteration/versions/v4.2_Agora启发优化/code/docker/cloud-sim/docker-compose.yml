# ============================================================
# 铉枢 · Cloud Simulation (API-only, no GPU)
# 模拟本机环境，验证所有服务可正常运行
# 启动: docker compose -f docker/cloud-sim/docker-compose.yml up -d
# ============================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: xuan-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/root/.ollama
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=5m
    restart: unless-stopped
    networks:
      - xuan-sim

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: xuan-webui
    volumes:
      - webui-data:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=cloud-sim-placeholder
      - MAX_SESSIONS_PER_USER=3
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - xuan-sim

  portainer:
    image: portainer/portainer-ce:latest
    container_name: xuan-portainer
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19443:9443"
    restart: unless-stopped
    networks:
      - xuan-sim

  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: xuan-pdf
    volumes:
      - pdf-data:/data
    ports:
      - "127.0.0.1:8400:8080"
    environment:
      - JAVA_OPTS=-Xmx1g
    restart: "no"
    networks:
      - xuan-sim

  drawio:
    image: jgraph/drawio:latest
    container_name: xuan-drawio
    ports:
      - "127.0.0.1:8080:8080"
    restart: "no"
    networks:
      - xuan-sim

volumes:
  ollama-data:
    driver: local
  webui-data:
    driver: local
  portainer-data:
    driver: local
  pdf-data:
    driver: local

networks:
  xuan-sim:
    driver: bridge
